# /opt/package-verify/policy.conf
# Root-owned security policy — not overridable via environment variables.
# Edit this file to change verification behavior.

# Path to allowlist file — use fixed path, not $HOME (HOME is user-steerable)
ALLOWLIST="/opt/package-verify/package-allowlist.txt"

# Flag packages published more recently than this (hours)
# 336 hours = 14 days — catches same-week supply chain attacks
# while giving time for legitimate releases to be vetted
MAX_AGE_HOURS=336

# Set to 1 to disable recency check (not recommended)
SKIP_RECENCY=0

# Set to 1 to disable content scan (not recommended)
SKIP_CONTENT=0

# Require allowlist membership — unknown packages are blocked
# Off by default: recency check is the primary defense
# Turn on for high-security environments
STRICT=0

# Block when verification checks fail (network errors, download failures)
# Fail closed: if we can't verify it, we don't install it
FAIL_CLOSED=1
